name: Build and publish site

on:
  schedule:
    # 20:00 UTC = 1hr after automations/concerts.yml's Monday 19:00 UTC run
    - cron: "0 20 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch concerts state
        run: curl -sf -o state.json https://raw.githubusercontent.com/shaanvaidya/automations/master/concerts/state.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate site
        run: python3 generate.py --state state.json --out dist/index.html

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _gh-pages-out

      - name: Publish
        run: |
          rsync -a --delete --exclude='.git' dist/ _gh-pages-out/
          cd _gh-pages-out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to publish"
          else
            git commit -m "Publish site $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
